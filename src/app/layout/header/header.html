<header class="header-container">
  <button class="menu-btn" (click)="toggleSideBar.emit()">Menu ☰</button>

  <div class="title">
    <h1>Inventory Managements System</h1>
    <p>Track products, manage inventory, and generate reports</p>
  </div>

  <button (click)="modal.mode = 'sign-in'; modal.open()" class="header-btn">Sign In</button>
  <button (click)="modal.mode = 'register'; modal.open()" class="header-btn">Register</button>

  <app-header-button-modal #modal></app-header-button-modal>
</header>
